services:
  # ── PostgreSQL Test ─────────────────────────────────────────
  postgres-test:
    image: postgres:18
    container_name: hdf-postgres18-test
    restart: unless-stopped
    environment:
      POSTGRES_DB: crediflow
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: "P&k24DLm!y3^5*4i"
      TZ: Asia/Bangkok
      PGTZ: Asia/Bangkok
      PGDATA: /var/lib/postgresql/18/docker
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    ports:
      - "55433:5432"
    volumes:
      - /opt/stacks/postgres18-test/data:/var/lib/postgresql
      - /opt/stacks/postgres18-test/config/postgresql.conf:/etc/postgresql/postgresql.conf:ro
      - /opt/stacks/postgres18-test/init:/docker-entrypoint-initdb.d:ro
    shm_size: 128mb
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dev -d crediflow || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - hdf-test-net

  # ── Identity Server Test ────────────────────────────────────
  identity-test:
    image: registry.lasiapp.vn:2105/crediflow-identity:1.0.0
    container_name: hdf-identity-test
    restart: unless-stopped
    depends_on:
      postgres-test:
        condition: service_healthy
    ports:
      - "8884:80"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:80
      ConnectionStrings__CrediFlowConnection: "Host=hdf-postgres18-test;Port=5432;Database=crediflow;Username=dev;Password=P&k24DLm!y3^5*4i;Maximum Pool Size=10;Minimum Pool Size=2;"
      JwtSettings__SecretKey: "7woPzjOR06P5lrT%xQbM6NHayzvRh%^%BLGQ#r$$mjAzWYKBRL#ODX#*lOMF$$Z4o25z*$$!LM$$BeAfKi7Z4J7rplsxt07^EyKU0vfMhxJuHc7Y58%q2rcU4PqAf^xbi23E!"
      JwtSettings__EcdsaPrivateKey: "MIGHAgEAMBMGByqGSM49AgEGCCqGSM49AwEHBG0wawIBAQQgu/ocXNIePPAbHRE41/stWVD+Nsnw6RXuE//KTBvukP2hRANCAAQzpsOIgHLo7cY7K8WjLiCbdYD3XmC9uJQuG9WzCmGiWgw1Z8SGZJB0W9k8nmqyuoMOj/zB6IxpryXU4XbcIhxI"
      JwtSettings__EcdsaPublicKey: "MFkwEwYHKoZIzj0CAQYIKoZIzj0DAQcDQgAEM6bDiIBy6O3GOyvFoy4gm3WA915gvbiULhvVswpholoMNWfEhmSQdFvZPJ5qsrqDDo/8weiMaa8l1OF23CIcSA=="
      JwtSettings__Issuer: "https://quanly.hdfinanceco.vn"
      JwtSettings__Audience: "hdf.api.identity"
      JwtSettings__AccessTokenExpirationMinutes: "30"
      JwtSettings__RefreshTokenExpirationDays: "7"
      JwtSettings__MaxFailedLoginAttempts: "10"
      JwtSettings__LockoutDurationMinutes: "15"
      Logging__LogLevel__Default: Information
      Logging__LogLevel__Microsoft__AspNetCore: Warning
      Logging__LogLevel__Microsoft__EntityFrameworkCore: Warning
      Logging__LogLevel__CrediFlow: Debug
    networks:
      - hdf-test-net

  # ── API Server Test ─────────────────────────────────────────
  api-test:
    image: xuantruong2204/crediflow-api:1.0.1
    container_name: hdf-api-test
    restart: unless-stopped
    depends_on:
      postgres-test:
        condition: service_healthy
    ports:
      - "8883:80"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:80
      ConnectionStrings__CrediFlowConnection: "Host=hdf-postgres18-test;Port=5432;Database=crediflow;Username=dev;Password=P&k24DLm!y3^5*4i;Maximum Pool Size=30;Minimum Pool Size=2;"
      ConnectionStrings__CrediFlowIdentityDB: "Host=hdf-postgres18-test;Port=5432;Database=crediflow;Username=dev;Password=P&k24DLm!y3^5*4i;Maximum Pool Size=10;Minimum Pool Size=2;"
      JwtSettings__Issuer: "https://quanly.hdfinanceco.vn"
      JwtSettings__Audience: "hdf.api.identity"
      Urls__IdentityServer: "http://hdf-identity-test:80"
      FileStorage__BasePath: /data/contracts
      FileStorage__MaxFileSizeBytes: "20971520"
      Logging__LogLevel__Default: Information
      Logging__LogLevel__Microsoft__AspNetCore: Warning
      Logging__LogLevel__Microsoft__EntityFrameworkCore: Warning
      Logging__LogLevel__CrediFlow: Debug
      AllowedHosts: "*"
    volumes:
      - /opt/hdf-test/contracts:/data/contracts
    networks:
      - hdf-test-net

networks:
  hdf-test-net:
    driver: bridge
